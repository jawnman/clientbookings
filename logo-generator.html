<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            font-family: 'Outfit', sans-serif;
        }

        .logo-container {
            position: relative;
            width: 600px;
            height: 200px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-image {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('src/assets/images/logo-bg.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.6);
            z-index: 1;
        }

        .text {
            position: relative;
            z-index: 2;
            color: white;
            font-size: 64px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <div class="bg-image"></div>
        <div class="text">Shot By Nick</div>
    </div>
    <p style="position: absolute; bottom: 20px; color: #555; text-align: center;">
        Screenshot this area to save your logo.<br>
        (Image generation service was busy, so I built this for you instead!)
    </p>
</body>

</html>
